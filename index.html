<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>製図室ポータル</title>
    <style>
        /* ここからがCSS（デザインのルール）です */
        body {
            font-family: sans-serif;
            margin: 0;
            background-color: #f4f4f9; /* 背景をほんのりグレーに */
        }
        header {
            background-color: #333; /* ヘッダーを黒に */
            color: white;
            padding: 15px;
            text-align: center;
        }
        .container {
            padding: 20px;
        }
        .menu-btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            color: white;
            border: none;
            border-radius: 8px; /* 角を丸くする */
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); /* 少し影をつける */
        }
        .qr-btn {
            background-color: #007BFF; /* 青色 */
        }
        .garbage-btn {
            background-color: #28a745; /* 緑色 */
        }
    </style>
</head>
<body>
    <header>
        <h1>製図室ポータル</h1>
    </header>
    
    <div class="container">
        <p>使いたい機能を選んでください</p>
        
        <button class="menu-btn qr-btn">📦 置き荷物・QR登録</button>
        <button class="menu-btn garbage-btn">🗑️ 今週のゴミ当番</button>
    </div>
</body>
</html>
